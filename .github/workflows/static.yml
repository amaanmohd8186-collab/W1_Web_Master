<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AMAAN SIDDIQUI — Quantum Web Architect & AI Experience Engineer</title>
  
  <!-- Premium Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Core Simulation, Motion & Physics Engines -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

  <!-- Tailwind CSS Core CDN Integration -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    if (typeof window !== 'undefined') {
      const configureTailwind = () => {
        if (window.tailwind) {
          window.tailwind.config = {
            theme: {
              extend: {
                colors: {
                  cyanNeon: '#00f7ff',
                  purplePlasma: '#9d00ff',
                  pinkHologram: '#ff2bd6',
                  emeraldGlow: '#00ffb3',
                  luxuryWhite: '#f8fafc',
                  deepBg: '#020308',
                },
                fontFamily: {
                  grotesk: ['"Space Grotesk"', 'sans-serif'],
                  sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                  mono: ['"Space Mono"', 'monospace'],
                }
              }
            }
          };
        }
      };
      if (window.tailwind) {
        configureTailwind();
      } else {
        window.addEventListener('load', configureTailwind);
      }
    }
  </script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }
    
    :root {
      --c: #00f7ff;
      --p: #8b00ff;
      --pk: #ff2bd6;
      --em: #00ffb3;
      --bl: #0077ff;
      --w: #f8fafc;
      --bg: #020308;
    }
    
    html {
      scroll-behavior: smooth;
      background-color: #020308;
    }
    
    body {
      background: var(--bg);
      color: var(--w);
      font-family: 'Plus Jakarta Sans', sans-serif;
      overflow-x: hidden;
      cursor: none;
      -webkit-font-smoothing: antialiased;
    }

    /* Premium Custom Scrollbars */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #020308;
    }
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #9d00ff, #00f7ff);
      border-radius: 10px;
    }

    #cursor-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999999;
    }
    
    #cur-cross {
      position: fixed;
      pointer-events: none;
      z-index: 999998;
      transform: translate(-50%, -50%);
      left: -100px;
      top: -100px;
      transition: transform 0.08s ease-out;
    }
    
    #cur-cross .arm {
      position: absolute;
      background: var(--c);
      transition: width .25s, height .25s, background .25s;
    }
    #cur-cross .arm.t { width: 1px; height: 18px; top: -22px; left: 50%; transform: translateX(-50%); }
    #cur-cross .arm.b { width: 1px; height: 18px; bottom: -22px; left: 50%; transform: translateX(-50%); }
    #cur-cross .arm.l { height: 1px; width: 18px; left: -22px; top: 50%; transform: translateY(-50%); }
    #cur-cross .arm.r { height: 1px; width: 18px; right: -22px; top: 50%; transform: translateY(-50%); }
    
    #cur-dot {
      position: fixed;
      width: 6px;
      height: 6px;
      background: var(--c);
      border-radius: 50%;
      pointer-events: none;
      z-index: 999999;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 10px var(--c), 0 0 20px var(--c);
      left: -100px;
      top: -100px;
    }
    
    #cur-label {
      position: fixed;
      pointer-events: none;
      z-index: 999997;
      font-family: 'Space Mono', monospace;
      font-size: 8px;
      letter-spacing: 2px;
      color: var(--c);
      opacity: 0;
      transition: opacity .3s, transform .3s;
      white-space: nowrap;
      transform: translate(24px, -50%);
      left: -100px;
      top: -100px;
    }

    .glow-overlay {
      position: absolute;
      border-radius: 50%;
      filter: blur(150px);
      pointer-events: none;
      z-index: 0;
      opacity: 0.18;
    }
    .glow-cyan { background: radial-gradient(circle, #00f7ff, transparent 70%); }
    .glow-purple { background: radial-gradient(circle, #9d00ff, transparent 70%); }
    .glow-pink { background: radial-gradient(circle, #ff2bd6, transparent 70%); }

    .scanlines {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9998;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
      opacity: 0.4;
    }

    /* Shimmering Cyber Border Mechanics */
    .cyber-border-wrap {
      position: relative;
      background: rgba(2, 3, 8, 0.7);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(0, 247, 255, 0.1);
    }
    .cyber-border-wrap::before {
      content: '';
      position: absolute;
      inset: -1px;
      background: linear-gradient(90deg, transparent, rgba(0, 247, 255, 0.4), transparent);
      z-index: -1;
      animation: borderMove 6s linear infinite;
      border-radius: inherit;
    }
    @keyframes borderMove {
      0% { background-position: 0% 50%; }
      100% { background-position: 400% 50%; }
    }

    .glass-hud {
      background: rgba(2, 3, 8, 0.65);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(248, 250, 252, 0.05);
    }

    /* Preloader boot structures */
    #boot {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 999990;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
    .boot-glow {
      text-shadow: 0 0 30px rgba(0, 247, 255, 0.6), 0 0 60px rgba(157, 0, 255, 0.4);
    }

    @media (max-width: 900px) {
      body { cursor: default !important; }
      #cur-cross, #cur-dot, #cur-label { display: none !important; }
    }

    /* Custom typewriter glow indicator */
    .typing-indicator span {
      display: inline-block;
      width: 6px;
      height: 6px;
      background-color: var(--c);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }
    .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
    .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1.0); }
    }
  </style>
</head>
<body class="font-sans antialiased">


    // --------------- STREAMING_CHUNK: Setting up Shell interactions ---------------
    // --------------- SHELL LOGIC (WITH GEMINI API BACKUP) ---------------
    const trmInput = document.getElementById('trm-input');
    const trmOutput = document.getElementById('trm-output');

    if (trmInput) {
      trmInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          const val = trmInput.value.trim();

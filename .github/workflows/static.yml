        }
      }, 250);

      initThreeJS();
      initBackgroundMiniSims();
      initCursorDynamics();
    });

    // --------------- GSAP CINEMATICS ---------------
    function initGSAPCines() {
      gsap.set("#hero-sub, #hero-btns, #hero-stats, #hero-dashboard", { opacity: 0 });

      gsap.from(".hero-title .line", {
        duration: 1.2,
        y: "100%",
        ease: "power4.out",
        stagger: 0.15
      });

      gsap.to("#hero-sub", { duration: 1, opacity: 1, y: 0, delay: 0.8, ease: "power2.out" });
      gsap.to("#hero-btns", { duration: 1, opacity: 1, y: 0, delay: 1.0, ease: "power2.out" });
      gsap.to("#hero-stats", { duration: 1, opacity: 1, delay: 1.2, ease: "power2.out" });
      gsap.to("#hero-dashboard", { duration: 1.2, opacity: 1, delay: 1.4, ease: "power2.out" });
    }

    // --------------- STREAMING_CHUNK: Initializing Three.js rendering core ---------------
    // --------------- THREE.JS SYSTEM ---------------
    function initThreeJS() {
      const container = document.getElementById('three-canvas');
      scene = new THREE.Scene();
      
      camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
      camera.position.z = 180;

      renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      container.appendChild(renderer.domElement);

      const starCount = 1200;
      const positions = new Float32Array(starCount * 3);
      const colors = new Float32Array(starCount * 3);
      const colorOptions = [
        new THREE.Color('#00f7ff'),
        new THREE.Color('#9d00ff'),
        new THREE.Color('#ff2bd6')
      ];

      for (let i = 0; i < starCount * 3; i += 3) {
        const theta = Math.random() * 2 * Math.PI;
        const phi = Math.acos(2 * Math.random() - 1);
        const r = 100 + Math.random() * 200;

        positions[i] = r * Math.sin(phi) * Math.cos(theta);
        positions[i+1] = r * Math.sin(phi) * Math.sin(theta);
        positions[i+2] = r * Math.cos(phi);

        const col = colorOptions[Math.floor(Math.random() * colorOptions.length)];
        colors[i] = col.r;
        colors[i+1] = col.g;
        colors[i+2] = col.b;
      }

      const starGeometry = new THREE.BufferGeometry();
      starGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      starGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

      const pSize = window.innerWidth < 768 ? 1.2 : 2.2;
      const starMaterial = new THREE.PointsMaterial({
        size: pSize,
        vertexColors: true,
        transparent: true,
        opacity: 0.7,
        sizeAttenuation: true
      });

      starParticles = new THREE.Points(starGeometry, starMaterial);
      scene.add(starParticles);

      const knotGeo = new THREE.TorusKnotGeometry(25, 4.5, 100, 16);
      const knotMat = new THREE.MeshPhongMaterial({
        color: 0x00f7ff,
        emissive: 0x9d00ff,
        specular: 0xffffff,
        shininess: 80,
        wireframe: true,
        transparent: true,
        opacity: 0.45
      });
      mainKnot = new THREE.Mesh(knotGeo, knotMat);
      scene.add(mainKnot);

      const pLight1 = new THREE.PointLight(0x00f7ff, 2, 300);
      pLight1.position.set(50, 50, 50);
      scene.add(pLight1);

      const pLight2 = new THREE.PointLight(0xff2bd6, 2, 300);
      pLight2.position.set(-50, -50, 50);
      scene.add(pLight2);

      const ambLight = new THREE.AmbientLight(0xffffff, 0.2);
      scene.add(ambLight);

      function animateScene() {
        requestAnimationFrame(animateScene);
        
        starParticles.rotation.y += 0.0004;
        starParticles.rotation.x += 0.0001;

        if (mainKnot) {
          mainKnot.rotation.y += 0.006;
          mainKnot.rotation.z += 0.003;
        }

        renderer.render(scene, camera);
      }
      
      animateScene();
      window.addEventListener('resize', onResizeThree);
    }

    function onResizeThree() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // --------------- STREAMING_CHUNK: Setting up visual cursor follower trail ---------------
    // --------------- CURSOR DYNAMICS ---------------
    function initCursorDynamics() {
      const dot = document.getElementById('cur-dot');
      const cross = document.getElementById('cur-cross');
      const label = document.getElementById('cur-label');
      const trailCanvas = document.getElementById('particles-canvas');
      const trailCtx = trailCanvas.getContext('2d');

      let mX = -100, mY = -100;
      let cX = -100, cY = -100;

      trailCanvas.width = window.innerWidth;
      trailCanvas.height = window.innerHeight;

      window.addEventListener('resize', () => {
        trailCanvas.width = window.innerWidth;
        trailCanvas.height = window.innerHeight;
      });

      window.addEventListener('mousemove', (e) => {
        mX = e.clientX;
        mY = e.clientY;
        
        const glow = document.getElementById('mouse-ambient-glow');
        if (glow) {
          glow.style.left = `${mX - 350}px`;
          glow.style.top = `${mY - 350}px`;
        }
      });

      function updateCursor() {
        let dx = mX - cX;
        let dy = mY - cY;
        
        cX += dx * 0.14;
        cY += dy * 0.14;

        dot.style.left = `${cX}px`;
        dot.style.top = `${cY}px`;

        cross.style.left = `${cX}px`;
        cross.style.top = `${cY}px`;

        label.style.left = `${cX}px`;
        label.style.top = `${cY}px`;

        requestAnimationFrame(updateCursor);
      }
      updateCursor();

      const hoverable = document.querySelectorAll('button, a, .sv-card, .pj-card, .pr-card, input, textarea');
      hoverable.forEach(el => {
        el.addEventListener('mouseenter', () => {
          dot.style.transform = 'translate(-50%, -50%) scale(1.8)';
          dot.style.background = '#ff2bd6';
          dot.style.boxShadow = '0 0 15px #ff2bd6';
          
          const arms = cross.querySelectorAll('.arm');
          arms.forEach(arm => {
            arm.style.background = '#ff2bd6';
            if (arm.classList.contains('t') || arm.classList.contains('b')) {
              arm.style.height = '24px';
            } else {
              arm.style.width = '24px';
            }
          });
          label.innerText = "SYS_COM_TARGET";
          label.style.opacity = "1";
        });

        el.addEventListener('mouseleave', () => {
          dot.style.transform = 'translate(-50%, -50%) scale(1)';
          dot.style.background = '#00f7ff';
          dot.style.boxShadow = '0 0 10px #00f7ff';

          const arms = cross.querySelectorAll('.arm');
          arms.forEach(arm => {
            arm.style.background = '#00f7ff';
            if (arm.classList.contains('t') || arm.classList.contains('b')) {
              arm.style.height = '18px';
            } else {
              arm.style.width = '18px';
            }
          });
          label.style.opacity = "0";
        });
      });

      let trailArray = [];
      function TrailNode(x, y) {
        this.x = x;
        this.y = y;
        this.size = Math.random() * 4 + 1.2;
        this.vx = Math.random() * 1.2 - 0.6;
        this.vy = Math.random() * 1.2 - 0.6;
        this.life = 1.0;
      }

      function drawTrails() {
        trailCtx.clearRect(0, 0, trailCanvas.width, trailCanvas.height);
        
        if (Math.abs(mX - cX) > 0.5 || Math.abs(mY - cY) > 0.5) {
          if (trailArray.length < 120) {
            trailArray.push(new TrailNode(cX, cY));
          }
        }

        for (let i = 0; i < trailArray.length; i++) {
          let node = trailArray[i];
          trailCtx.fillStyle = `rgba(0, 247, 255, ${node.life * 0.35})`;
          trailCtx.beginPath();
          trailCtx.arc(node.x, node.y, node.size, 0, Math.PI * 2);
          trailCtx.fill();

          node.x += node.vx;
          node.y += node.vy;
          node.life -= 0.035;

          if (node.life <= 0) {
            trailArray.splice(i, 1);
            i--;
          }
        }
        requestAnimationFrame(drawTrails);
      }
      drawTrails();
    }

    // --------------- PROJECT MINI SIMULATORS ---------------
    function initBackgroundMiniSims() {
      for (let s = 1; s <= 2; s++) {
        const can = document.getElementById(`p${s}-canvas`);
        if (!can) continue;
        const ctx = can.getContext('2d');
        can.width = 400;
        can.height = 220;

        let phase = 0;
        function updateMini() {
          ctx.clearRect(0, 0, can.width, can.height);
          ctx.lineWidth = 1.2;

          if (s === 1) {
            ctx.strokeStyle = 'rgba(0, 247, 255, 0.25)';
            ctx.beginPath();
            for (let x = 0; x < can.width; x += 10) {
              let y = can.height / 2 + Math.sin(x * 0.02 + phase) * 30 * Math.sin(x * 0.005);
              if (x === 0) ctx.moveTo(x, y);
              else ctx.lineTo(x, y);
            }
            ctx.stroke();
          } else {
            ctx.strokeStyle = 'rgba(157, 0, 255, 0.3)';
            let cx = can.width / 2;
            let cy = can.height / 2;
            for (let r = 25; r < 110; r += 20) {
              ctx.beginPath();
              ctx.arc(cx + Math.cos(phase * 0.5) * 8, cy, r, 0, Math.PI * 2);
              ctx.stroke();
            }
          }
          phase += 0.025;
          requestAnimationFrame(updateMini);
        }
        updateMini();
      }
    }

    window.addEventListener('scroll', () => {
      const bar = document.getElementById('scroll-bar');
      const max = document.documentElement.scrollHeight - window.innerHeight;
      if (max > 0) {
        let pct = (window.scrollY / max) * 100;
        bar.style.width = `${pct}%`;

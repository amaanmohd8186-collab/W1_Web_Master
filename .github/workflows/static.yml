    function runWaveDemo() {
      function draw() {
        if (!demoCtx) return;
        demoCtx.fillStyle = 'rgba(2, 3, 8, 0.2)';
        demoCtx.fillRect(0, 0, demoCanvas.width, demoCanvas.height);

        const freq = (3.5 + Math.sin(demoPhase * 0.4) * 1.5 + demoInteractionsCount).toFixed(2);
        const ratio = (0.78 + Math.cos(demoPhase) * 0.12).toFixed(3);
        document.getElementById('demo-hud-metrics').innerHTML = `WAVE_FREQUENCY: ${freq} Hz<br>ENERGY_RESONANCE: ${ratio}<br>PARALLAX: SYS_STABLE`;

        demoCtx.lineWidth = 1.8;
        const offset = demoInteractionsCount * 10;

        for (let line = 0; line < 3; line++) {
          demoCtx.strokeStyle = line === 0 ? 'rgba(0, 247, 255, 0.75)' : (line === 1 ? 'rgba(157, 0, 255, 0.5)' : 'rgba(255, 43, 214, 0.4)');
          demoCtx.beginPath();
          for (let x = 0; x < demoCanvas.width; x++) {
            let amp = 40 + Math.sin(demoPhase + line) * 15;
            let y = demoCanvas.height / 2 + Math.sin(x * 0.007 + demoPhase + line * 0.6) * amp * Math.cos(x * 0.002 - demoPhase * 0.3);
            
            if (offset > 0) {
              y += Math.sin(x * 0.04) * offset * Math.exp(-Math.abs(x - demoCanvas.width/2) / 180);
            }

            if (x === 0) demoCtx.moveTo(x, y);
            else demoCtx.lineTo(x, y);
          }
          demoCtx.stroke();
        }

        if (demoInteractionsCount > 0) demoInteractionsCount *= 0.96;
        demoPhase += 0.035;
        demoAnimId = requestAnimationFrame(draw);
      }
      if (demoAnimId) cancelAnimationFrame(demoAnimId);
      draw();
    }

    function runGravityDemo() {
      const particles = [];
      const pCount = 60;
      for (let i = 0; i < pCount; i++) {
        particles.push({
          x: Math.random() * demoCanvas.width,
          y: Math.random() * demoCanvas.height,
          ox: Math.random() * demoCanvas.width,
          oy: Math.random() * demoCanvas.height,
          size: Math.random() * 2.5 + 1
        });
      }

      let mx = demoCanvas.width / 2, my = demoCanvas.height / 2;
      demoCanvas.addEventListener('mousemove', (e) => {
        const r = demoCanvas.getBoundingClientRect();
        mx = e.clientX - r.left;
        my = e.clientY - r.top;
      });

      function draw() {
        if (!demoCtx) return;
        demoCtx.fillStyle = '#020308';
        demoCtx.fillRect(0, 0, demoCanvas.width, demoCanvas.height);

        const pull = (1.1 + demoInteractionsCount * 0.4).toFixed(2);
        document.getElementById('demo-hud-metrics').innerHTML = `GRAVITY_PULL: ${pull}x<br>ENERGY_DRIFT: STABLE<br>RENDER: 60FPS`;

        demoCtx.strokeStyle = 'rgba(0, 247, 255, 0.04)';
        demoCtx.lineWidth = 1;
        demoCtx.beginPath();
        demoCtx.arc(mx, my, 80 + demoInteractionsCount * 12, 0, Math.PI * 2);
        demoCtx.stroke();

        for (let i = 0; i < pCount; i++) {
          let p = particles[i];
          let dx = mx - p.x;
          let dy = my - p.y;
          let dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < 150 + demoInteractionsCount * 25) {
            let force = (150 - dist) / 400;
            p.x += (dx / dist) * force * (2 + demoInteractionsCount);
            p.y += (dy / dist) * force * (2 + demoInteractionsCount);
          } else {
            p.x += (p.ox - p.x) * 0.05;
            p.y += (p.oy - p.y) * 0.05;
          }

          demoCtx.fillStyle = i % 2 === 0 ? '#ff2bd6' : '#00f7ff';
          demoCtx.beginPath();
          demoCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          demoCtx.fill();

          for (let j = i + 1; j < pCount; j++) {
            let p2 = particles[j];
            let ndx = p2.x - p.x;
            let ndy = p2.y - p.y;
            let ndist = Math.sqrt(ndx * ndx + ndy * ndy);

            if (ndist < 70) {
              demoCtx.strokeStyle = `rgba(157, 0, 255, ${(1 - ndist/70) * 0.18})`;
              demoCtx.beginPath();
              demoCtx.moveTo(p.x, p.y);
              demoCtx.lineTo(p2.x, p2.y);
              demoCtx.stroke();
            }
          }
        }

        if (demoInteractionsCount > 0) demoInteractionsCount *= 0.95;
        demoAnimId = requestAnimationFrame(draw);
      }
      if (demoInteractionsCount > 0) demoInteractionsCount *= 0.95;
      draw();
    }

    function triggerDemoInteraction() {
      demoInteractionsCount = 8;
      printShell(`~$ FORCE VALUE INJECTED IN LAB_${currentDemoProj === 0 ? '01' : '02'}`, 'text-purplePlasma');
    }

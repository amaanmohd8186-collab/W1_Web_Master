    // --------------- STREAMING_CHUNK: Creating fetch hooks with backoff structures ---------------
    // Universal Gemini API Fetch Core with Exponential Backoff
    async function callGeminiAPI(userQuery, systemPrompt, retries = 3, delay = 1000) {
      const payload = {
        contents: [{ parts: [{ text: userQuery }] }],
        systemInstruction: {
          parts: [{ text: systemPrompt }]
        }
      };

      for (let attempt = 1; attempt <= retries; attempt++) {
        try {
          const response = await fetch(GEMINI_API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          if (!response.ok) {
            if (response.status === 429 && attempt < retries) {
              // Throttle hit, backoff exponentially
              await new Promise(res => setTimeout(res, delay * attempt));
              continue;
            }
            throw new Error(`HTTP dynamic state parameter error: ${response.status}`);
          }

          const result = await response.json();
          const candidate = result.candidates?.[0];
          if (candidate && candidate.content?.parts?.[0]?.text) {
            return candidate.content.parts[0].text;
          }
          throw new Error("Empty candidate payload array encountered.");
        } catch (error) {
          if (attempt === retries) throw error;
          await new Promise(res => setTimeout(res, delay * attempt));
        }
      }
    }


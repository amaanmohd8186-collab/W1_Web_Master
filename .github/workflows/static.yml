    function printShell(text, cls = '') {
      const div = document.createElement('div');
      div.className = `t-out ${cls}`;
      div.innerText = text;
      trmOutput.appendChild(div);
      trmOutput.scrollTop = trmOutput.scrollHeight;
    }

    async function execShell(raw) {
      const cmd = raw.toLowerCase().trim();
